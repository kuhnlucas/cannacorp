# ===========================================================
# docker-compose.prod.yml — CannaCorp — Producción
# ===========================================================
# Usa los Dockerfiles multi-stage (build real).
# Reemplaza SQLite por PostgreSQL.
#
# Uso:
#   docker compose -f docker-compose.prod.yml build
#   docker compose -f docker-compose.prod.yml up -d
#
# ===========================================================

services:
  # -------------------------------------------------------
  # PostgreSQL
  # -------------------------------------------------------
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: cannagrow
      POSTGRES_USER: cannagrow
      POSTGRES_PASSWORD: ${DB_PASSWORD:?Definir DB_PASSWORD en .env}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cannagrow"]
      interval: 5s
      timeout: 3s
      retries: 5

  # -------------------------------------------------------
  # API — Express + Prisma + PostgreSQL
  # -------------------------------------------------------
  api:
    build:
      context: ./backend
      dockerfile: ../docker/Dockerfile.api
    restart: unless-stopped
    ports:
      - "${API_PORT:-3000}:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DATABASE_URL=postgresql://cannagrow:${DB_PASSWORD}@db:5432/cannagrow
      - JWT_SECRET=${JWT_SECRET:?Definir JWT_SECRET en .env}
      - TUYA_CLIENT_ID=${TUYA_CLIENT_ID:-}
      - TUYA_CLIENT_SECRET=${TUYA_CLIENT_SECRET:-}
      - TUYA_REGION=${TUYA_REGION:-us}
      - TUYA_BASE_URL=${TUYA_BASE_URL:-}
      - PULSE_GROW_API_URL=${PULSE_GROW_API_URL:-}
      - PULSE_GROW_API_KEY=${PULSE_GROW_API_KEY:-}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  # -------------------------------------------------------
  # WEB — Nginx con assets estáticos (build de Vite)
  # -------------------------------------------------------
  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.web
      args:
        # En producción, la URL real de la API
        VITE_API_URL: ${VITE_API_URL:?Definir VITE_API_URL en .env}
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-80}:80"
    depends_on:
      - api

volumes:
  pgdata:
